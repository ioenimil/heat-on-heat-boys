name: PR CI

on:
    pull_request:
        branches: [main]
        paths:
            - backend/**
            - data-engineering/**
            - .github/workflows/**

concurrency:
    group: pr-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read
    id-token: write # Required for GitHub Actions OIDC authentication

jobs:
    ci:
        name: Backend PR checks
        uses: ./.github/workflows/ci-reusable.yml
        with:
            run_checkstyle: true
            run_tests: true
            build_image: false
            run_data_tests: true
            run_checkov: false
            deploy_dags: false
        secrets: inherit
