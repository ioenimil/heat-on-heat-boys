name: Backend CI (Reusable)

on:
    workflow_call:
        inputs:
            run_checkstyle:
                type: boolean
                required: false
                default: false
            run_tests:
                type: boolean
                required: false
                default: false
            build_image:
                type: boolean
                required: false
                default: false
        outputs:
            image_tag:
                description: Short SHA tag used for Docker image
                value: ${{ jobs.build-image.outputs.image_tag }}

jobs:
    checkstyle:
        name: Backend checkstyle
        runs-on: ubuntu-latest
        if: inputs.run_checkstyle
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Java
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: "25"
                  cache: maven

            - name: Run checkstyle
              working-directory: backend
              run: mvn -B -DskipTests checkstyle:check

    test:
        name: Backend tests
        runs-on: ubuntu-latest
        if: inputs.run_tests
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Java
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: "25"
                  cache: maven

            - name: Run tests
              working-directory: backend
              run: mvn -B test

    build-image:
        name: Build Docker image
        runs-on: ubuntu-latest
        needs: [checkstyle, test]
        if: inputs.build_image && (needs.checkstyle.result == 'success' || needs.checkstyle.result == 'skipped') && (needs.test.result == 'success' || needs.test.result == 'skipped')
        outputs:
            image_tag: ${{ steps.meta.outputs.image_tag }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Compute image tag
              id: meta
              run: |
                  TAG=$(git rev-parse --short=12 HEAD)
                  echo "image_tag=$TAG" >> "$GITHUB_OUTPUT"

            - name: Restore Buildx cache
              uses: actions/cache@v4
              with:
                  path: /tmp/.buildx-cache
                  key: buildx-${{ runner.os }}-${{ hashFiles('backend/Dockerfile') }}-${{ github.sha }}
                  restore-keys: |
                      buildx-${{ runner.os }}-

            - name: Build image (no push)
              uses: docker/build-push-action@v6
              with:
                  context: backend
                  file: backend/Dockerfile
                  tags: servicehub:${{ steps.meta.outputs.image_tag }}
                  push: false
                  cache-from: type=local,src=/tmp/.buildx-cache
                  cache-to: type=local,dest=/tmp/.buildx-cache-new

            - name: Move Buildx cache
              run: |
                  rm -rf /tmp/.buildx-cache
                  mv /tmp/.buildx-cache-new /tmp/.buildx-cache
