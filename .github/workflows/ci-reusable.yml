name: Backend CI (Reusable)

on:
    workflow_call:
        inputs:
            run_checkstyle:
                type: boolean
                required: false
                default: false
            run_tests:
                type: boolean
                required: false
                default: false
            build_image:
                type: boolean
                required: false
                default: false
            push_image:
                type: boolean
                required: false
                default: false
            run_checkov:
                type: boolean
                required: false
                default: false
            run_data_tests:
                type: boolean
                required: false
                default: false
            deploy_dags:
                type: boolean
                required: false
                default: false
        outputs:
            image_tag:
                description: Short SHA tag used for Docker image
                value: ${{ jobs.build-image.outputs.image_tag }}

jobs:
    checkstyle:
        permissions:
            contents: read
            id-token: write
        name: Backend checkstyle
        runs-on: ubuntu-latest
        if: inputs.run_checkstyle
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Java
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: "25"
                  cache: maven

            - name: Run checkstyle
              working-directory: backend
              run: mvn -B -DskipTests checkstyle:check

    checkov:
        permissions:
            contents: read
            id-token: write
        name: Checkov Infrastructure Scan
        runs-on: ubuntu-latest
        if: inputs.run_checkov
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Run Checkov
              uses: bridgecrewio/checkov-action@master
              with:
                  directory: ops-engine-room/infrastructure
                  quiet: true
                  soft_fail: true
                  skip_check: CKV_AWS_1,CKV_AWS_2 # Adjust as needed

    data-tests:
        permissions:
            contents: read
        name: Data Engineering Lint & Test
        runs-on: ubuntu-latest
        if: inputs.run_data_tests
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.10"

            - name: Install dependencies
              working-directory: data-engineering
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt
                  pip install flake8 pytest

            - name: Lint with flake8
              working-directory: data-engineering
              run: |
                  # stop the build if there are Python syntax errors or undefined names
                  flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
                  # exit-zero treats all errors as warnings
                  flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

            # We can run pytest here if tests are present
            # - name: Run tests
            #   working-directory: data-engineering
            #   run: pytest

    test:
        permissions:
            contents: read
            id-token: write
        name: Backend tests
        runs-on: ubuntu-latest
        if: inputs.run_tests
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Java
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: "25"
                  cache: maven

            - name: Run tests
              working-directory: backend
              run: mvn -B test

    build-image:
        permissions:
            contents: read
            id-token: write
        name: Build Docker image
        runs-on: ubuntu-latest
        needs: [checkstyle, test]
        if: inputs.build_image && (needs.checkstyle.result == 'success' || needs.checkstyle.result == 'skipped') && (needs.test.result == 'success' || needs.test.result == 'skipped')
        outputs:
            image_tag: ${{ steps.meta.outputs.image_tag }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Compute image tag
              id: meta
              run: |
                  TAG=$(git rev-parse --short=12 HEAD)
                  echo "image_tag=$TAG" >> "$GITHUB_OUTPUT"

            - name: Restore Buildx cache
              uses: actions/cache@v4
              with:
                  path: /tmp/.buildx-cache
                  key: buildx-${{ runner.os }}-${{ hashFiles('backend/Dockerfile') }}-${{ github.sha }}
                  restore-keys: |
                      buildx-${{ runner.os }}-

            - name: Build image (no push)
              uses: docker/build-push-action@v6
              with:
                  context: backend
                  file: backend/Dockerfile
                  tags: servicehub:${{ steps.meta.outputs.image_tag }}
                  push: false
                  load: true
                  cache-from: type=local,src=/tmp/.buildx-cache
                  cache-to: type=local,dest=/tmp/.buildx-cache-new

            - name: Move Buildx cache
              run: |
                  rm -rf /tmp/.buildx-cache
                  mv /tmp/.buildx-cache-new /tmp/.buildx-cache

            - name: Export Image for Push Job
              if: inputs.push_image
              run: docker image save servicehub:${{ steps.meta.outputs.image_tag }} -o /tmp/backend-image.tar

            - name: Upload Image Artifact
              if: inputs.push_image
              uses: actions/upload-artifact@v4
              with:
                  name: backend-image
                  path: /tmp/backend-image.tar
                  retention-days: 1

    push-image:
        permissions:
            contents: read
            id-token: write
        name: Push Docker image to ECR
        runs-on: ubuntu-latest
        needs: build-image
        if: inputs.push_image
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Download Image Artifact
              uses: actions/download-artifact@v4
              with:
                  name: backend-image
                  path: /tmp

            - name: Load Image
              run: docker image load -i /tmp/backend-image.tar

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
                  aws-region: ${{ secrets.AWS_REGION }}

            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2

            - name: Tag and Push image
              run: |
                  ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}
                  ECR_REPOSITORY=${{ secrets.ECR_REPOSITORY }}
                  IMAGE_TAG=${{ needs.build-image.outputs.image_tag }}

                  docker tag servicehub:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
                  docker tag servicehub:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest

                  docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
                  docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

    deploy-dags:
        name: Deploy Airflow DAGs
        runs-on: ubuntu-latest
        needs: data-tests
        if: inputs.deploy_dags && (needs.data-tests.result == 'success' || needs.data-tests.result == 'skipped')
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Generate .env file
              working-directory: data-engineering
              run: |
                  echo "DB_HOST=${{ secrets.DB_HOST }}" >> .env
                  echo "DB_PORT=${{ secrets.DB_PORT }}" >> .env
                  echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
                  echo "DB_USER=${{ secrets.DB_USER }}" >> .env
                  echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env

            - name: Copy DAGs via SCP
              uses: appleboy/scp-action@v0.1.7
              with:
                  host: ${{ secrets.EC2_HOST }}
                  username: ${{ secrets.EC2_USER }}
                  key: ${{ secrets.EC2_SSH_KEY }}
                  source: "data-engineering/dags/*,data-engineering/config.py,data-engineering/etl_pipeline.py,data-engineering/.env"
                  target: "/opt/airflow/dags/"
                  strip_components: 1
