<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{components/layout :: page(~{::content})}">
<head><title>All Requests</title></head>
<body>
  <div th:fragment="content">

    <div class="mb-6">
      <h2 class="text-2xl font-semibold text-foreground">All Requests</h2>
      <p class="text-sm text-muted-foreground-1">Every service request across all users and departments.</p>
    </div>

    <!-- Filter bar -->
    <div class="bg-card border border-card-line rounded-xl shadow-2xs mb-4">
      <form th:action="@{/requests}" method="get" class="flex flex-wrap gap-3 p-4 items-end">
        <div class="flex-1 min-w-48">
          <label class="block text-xs font-medium text-muted-foreground-2 mb-1">Search</label>
          <input type="text" name="q" th:value="${param.q}" placeholder="Title or requester..."
                 class="py-2 px-3 block w-full bg-background border border-card-line rounded-lg text-sm focus:outline-hidden focus:ring-2 focus:ring-primary/30 focus:border-primary transition" />
        </div>
        <div>
          <label class="block text-xs font-medium text-muted-foreground-2 mb-1">Status</label>
          <select name="status" class="py-2 px-3 block bg-background border border-card-line rounded-lg text-sm focus:outline-hidden focus:ring-2 focus:ring-primary/30 focus:border-primary transition">
            <option value="">All</option>
            <option value="OPEN"        th:selected="${param.status == 'OPEN'}">Open</option>
            <option value="ASSIGNED"    th:selected="${param.status == 'ASSIGNED'}">Assigned</option>
            <option value="IN_PROGRESS" th:selected="${param.status == 'IN_PROGRESS'}">In Progress</option>
            <option value="RESOLVED"    th:selected="${param.status == 'RESOLVED'}">Resolved</option>
            <option value="CLOSED"      th:selected="${param.status == 'CLOSED'}">Closed</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-medium text-muted-foreground-2 mb-1">Category</label>
          <select name="category" class="py-2 px-3 block bg-background border border-card-line rounded-lg text-sm focus:outline-hidden focus:ring-2 focus:ring-primary/30 focus:border-primary transition">
            <option value="">All</option>
            <option value="IT"         th:selected="${param.category == 'IT'}">IT</option>
            <option value="HR"         th:selected="${param.category == 'HR'}">HR</option>
            <option value="Finance"    th:selected="${param.category == 'Finance'}">Finance</option>
            <option value="Facilities" th:selected="${param.category == 'Facilities'}">Facilities</option>
            <option value="Other"      th:selected="${param.category == 'Other'}">Other</option>
          </select>
        </div>
        <button type="submit" class="py-2 px-4 text-sm font-medium rounded-lg bg-primary text-primary-foreground hover:bg-primary-hover transition">Filter</button>
      </form>
    </div>

    <div class="bg-card border border-card-line rounded-xl shadow-2xs">

      <div th:if="${allTickets == null or #lists.isEmpty(allTickets)}"
           class="flex flex-col items-center justify-center py-16 text-center">
        <svg class="size-10 text-muted-foreground-2 opacity-30 mb-3" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/>
        </svg>
        <p class="text-sm text-muted-foreground-1">No requests found.</p>
      </div>

      <div th:if="${allTickets != null and not #lists.isEmpty(allTickets)}" class="overflow-x-auto">
        <table class="min-w-full divide-y divide-card-line">
          <thead class="bg-muted-hover">
            <tr>
              <th class="px-5 py-3 text-left text-xs font-semibold uppercase tracking-wide text-muted-foreground-2">Title</th>
              <th class="px-5 py-3 text-left text-xs font-semibold uppercase tracking-wide text-muted-foreground-2">Requester</th>
              <th class="px-5 py-3 text-left text-xs font-semibold uppercase tracking-wide text-muted-foreground-2">Category</th>
              <th class="px-5 py-3 text-left text-xs font-semibold uppercase tracking-wide text-muted-foreground-2">Priority</th>
              <th class="px-5 py-3 text-left text-xs font-semibold uppercase tracking-wide text-muted-foreground-2">Assigned To</th>
              <th class="px-5 py-3 text-left text-xs font-semibold uppercase tracking-wide text-muted-foreground-2">Status</th>
              <th class="px-5 py-3 text-left text-xs font-semibold uppercase tracking-wide text-muted-foreground-2">Submitted</th>
              <th class="px-5 py-3"></th>
            </tr>
          </thead>
          <tbody class="divide-y divide-card-line">
            <tr th:each="t : ${allTickets}" class="hover:bg-muted-hover transition-colors">
              <td class="px-5 py-3.5 text-sm font-medium text-foreground" th:text="${t.title}"></td>
              <td class="px-5 py-3.5 text-sm text-muted-foreground-1" th:text="${t.requesterName}"></td>
              <td class="px-5 py-3.5 text-sm text-muted-foreground-1" th:text="${t.category}"></td>
              <td class="px-5 py-3.5">
                <span class="inline-flex items-center py-0.5 px-2 rounded text-xs font-bold uppercase tracking-wide"
                      th:classappend="${t.priority == 'CRITICAL'} ? 'bg-red-100 text-red-700'   :
                                       (${t.priority == 'HIGH'}   ? 'bg-amber-100 text-amber-700' :
                                       (${t.priority == 'MEDIUM'} ? 'bg-blue-100 text-blue-700'   : 'bg-surface-1 text-muted-foreground-2'))"
                      th:text="${t.priority}"></span>
              </td>
              <td class="px-5 py-3.5 text-sm text-muted-foreground-1" th:text="${t.assignedAgentName} ?: '—'"></td>
              <td class="px-5 py-3.5">
                <span class="inline-flex items-center py-0.5 px-2.5 rounded-full text-xs font-semibold uppercase tracking-wide"
                      th:classappend="${t.status == 'OPEN'}         ? 'bg-blue-50 text-blue-700'    :
                                       (${t.status == 'IN_PROGRESS'} ? 'bg-amber-50 text-amber-700'  :
                                       (${t.status == 'RESOLVED'}    ? 'bg-green-50 text-green-700'  : 'bg-surface-1 text-muted-foreground-2'))"
                      th:text="${t.status}"></span>
              </td>
              <td class="px-5 py-3.5 text-sm text-muted-foreground-1"
                  th:text="${#temporals.format(t.createdAt, 'dd MMM yyyy')}"></td>
              <td class="px-5 py-3.5 text-right">
                <a th:href="@{/requests/{id}(id=${t.id})}"
                   class="text-xs font-medium text-primary hover:underline">View</a>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

    </div>

  </div>
</body>
</html>
