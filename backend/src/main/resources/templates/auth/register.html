<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ServiceHub — Create Account</title>
    <link rel="stylesheet" th:href="@{/assets/main.css}" />
</head>

<body class="bg-background text-foreground min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-sm">

        <!-- Logo / Brand -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center size-12 rounded-xl bg-primary mb-4">
                <svg class="size-6 text-primary-foreground" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <rect width="7" height="9" x="3" y="3" rx="1" />
                    <rect width="7" height="5" x="14" y="3" rx="1" />
                    <rect width="7" height="9" x="14" y="12" rx="1" />
                    <rect width="7" height="5" x="3" y="16" rx="1" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-foreground">ServiceHub</h1>
            <p class="text-sm text-muted-foreground-1 mt-1">Create your account</p>
        </div>

        <!-- Card -->
        <div class="bg-card border border-card-line rounded-xl shadow-2xs p-6">

            <!-- Error alert -->
            <div th:if="${error}"
                 class="flex items-center gap-3 bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-3 mb-5">
                <svg class="size-4 shrink-0" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10" /><line x1="12" x2="12" y1="8" y2="12" /><line x1="12" x2="12.01" y1="16" y2="16" />
                </svg>
                <span th:text="${error}">Registration failed.</span>
            </div>

            <!-- Registration form -->
            <form th:action="@{/api/auth/register}" method="post" class="space-y-4">

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label for="firstName" class="block text-sm font-medium text-foreground mb-1.5">First name</label>
                        <input type="text" id="firstName" name="firstName" autocomplete="given-name" required
                               placeholder="Jane"
                               class="py-2.5 px-3 block w-full bg-background border border-card-line rounded-lg text-sm text-foreground placeholder:text-muted-foreground-2 focus:outline-hidden focus:ring-2 focus:ring-primary/30 focus:border-primary transition" />
                    </div>
                    <div>
                        <label for="lastName" class="block text-sm font-medium text-foreground mb-1.5">Last name</label>
                        <input type="text" id="lastName" name="lastName" autocomplete="family-name" required
                               placeholder="Smith"
                               class="py-2.5 px-3 block w-full bg-background border border-card-line rounded-lg text-sm text-foreground placeholder:text-muted-foreground-2 focus:outline-hidden focus:ring-2 focus:ring-primary/30 focus:border-primary transition" />
                    </div>
                </div>

                <div>
                    <label for="email" class="block text-sm font-medium text-foreground mb-1.5">Email address</label>
                    <input type="email" id="email" name="email" autocomplete="email" required
                           placeholder="you@company.com"
                           class="py-2.5 px-3 block w-full bg-background border border-card-line rounded-lg text-sm text-foreground placeholder:text-muted-foreground-2 focus:outline-hidden focus:ring-2 focus:ring-primary/30 focus:border-primary transition" />
                </div>

                <div>
                    <label for="department" class="block text-sm font-medium text-foreground mb-1.5">Department</label>
                    <input type="text" id="department" name="department" required
                           placeholder="e.g. Engineering"
                           class="py-2.5 px-3 block w-full bg-background border border-card-line rounded-lg text-sm text-foreground placeholder:text-muted-foreground-2 focus:outline-hidden focus:ring-2 focus:ring-primary/30 focus:border-primary transition" />
                </div>

                <div>
                    <label for="newPassword" class="block text-sm font-medium text-foreground mb-1.5">Password</label>
                    <input type="password" id="newPassword" name="password" autocomplete="new-password" required
                           placeholder="Min. 8 characters"
                           class="py-2.5 px-3 block w-full bg-background border border-card-line rounded-lg text-sm text-foreground placeholder:text-muted-foreground-2 focus:outline-hidden focus:ring-2 focus:ring-primary/30 focus:border-primary transition" />
                </div>

                <div>
                    <label for="confirmPassword" class="block text-sm font-medium text-foreground mb-1.5">Confirm password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" autocomplete="new-password" required
                           placeholder="••••••••"
                           class="py-2.5 px-3 block w-full bg-background border border-card-line rounded-lg text-sm text-foreground placeholder:text-muted-foreground-2 focus:outline-hidden focus:ring-2 focus:ring-primary/30 focus:border-primary transition" />
                </div>

                <button type="submit"
                        class="w-full py-2.5 px-4 inline-flex justify-center items-center gap-x-2 text-sm font-semibold rounded-lg bg-primary border border-primary-line text-primary-foreground hover:bg-primary-hover focus:outline-hidden focus:bg-primary-focus disabled:opacity-50 disabled:pointer-events-none transition">
                    Create account
                </button>

            </form>

        </div>

        <!-- Login link -->
        <p class="text-center text-sm text-muted-foreground-1 mt-4">
            Already have an account?
            <a th:href="@{/login}" class="text-primary font-medium hover:underline">Sign in</a>
        </p>

    </div>

    <script type="module" th:src="@{/assets/main.js}"></script>
</body>

</html>
