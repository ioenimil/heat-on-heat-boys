<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ServiceHub — Sign In</title>
    <link rel="stylesheet" th:href="@{/assets/main.css}" />
</head>

<body class="bg-background text-foreground min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-sm">

        <!-- Logo / Brand -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center size-12 rounded-xl bg-primary mb-4">
                <svg class="size-6 text-primary-foreground" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <rect width="7" height="9" x="3" y="3" rx="1" />
                    <rect width="7" height="5" x="14" y="3" rx="1" />
                    <rect width="7" height="9" x="14" y="12" rx="1" />
                    <rect width="7" height="5" x="3" y="16" rx="1" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-foreground">ServiceHub</h1>
            <p class="text-sm text-muted-foreground-1 mt-1">Sign in to your account</p>
        </div>

        <!-- Card -->
        <div class="bg-card border border-card-line rounded-xl shadow-2xs p-6">

            <!-- Error alert -->
            <div th:if="${param.error}"
                 class="flex items-center gap-3 bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-3 mb-5">
                <svg class="size-4 shrink-0" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10" /><line x1="12" x2="12" y1="8" y2="12" /><line x1="12" x2="12.01" y1="16" y2="16" />
                </svg>
                Invalid email or password. Please try again.
            </div>

            <!-- Logout success alert -->
            <div th:if="${param.logout}"
                 class="flex items-center gap-3 bg-green-50 border border-green-200 text-green-700 text-sm rounded-lg px-4 py-3 mb-5">
                <svg class="size-4 shrink-0" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" /><polyline points="22 4 12 14.01 9 11.01" />
                </svg>
                You have been signed out successfully.
            </div>

            <!-- Login form — Spring Security processes POST /login -->
            <form th:action="@{/login}" method="post" class="space-y-4">

                <div>
                    <label for="username" class="block text-sm font-medium text-foreground mb-1.5">Email address</label>
                    <input type="email" id="username" name="username" autocomplete="email" required
                           placeholder="you@company.com"
                           class="py-2.5 px-3 block w-full bg-background border border-card-line rounded-lg text-sm text-foreground placeholder:text-muted-foreground-2 focus:outline-hidden focus:ring-2 focus:ring-primary/30 focus:border-primary transition" />
                </div>

                <div>
                    <div class="flex items-center justify-between mb-1.5">
                        <label for="password" class="block text-sm font-medium text-foreground">Password</label>
                        <a href="#" class="text-xs text-primary hover:underline">Forgot password?</a>
                    </div>
                    <input type="password" id="password" name="password" autocomplete="current-password" required
                           placeholder="••••••••"
                           class="py-2.5 px-3 block w-full bg-background border border-card-line rounded-lg text-sm text-foreground placeholder:text-muted-foreground-2 focus:outline-hidden focus:ring-2 focus:ring-primary/30 focus:border-primary transition" />
                </div>

                <div class="flex items-center gap-2">
                    <input type="checkbox" id="remember" name="remember-me"
                           class="shrink-0 size-4 rounded border-card-line text-primary focus:ring-primary/30" />
                    <label for="remember" class="text-sm text-muted-foreground-1">Remember me</label>
                </div>

                <button type="submit"
                        class="w-full py-2.5 px-4 inline-flex justify-center items-center gap-x-2 text-sm font-semibold rounded-lg bg-primary border border-primary-line text-primary-foreground hover:bg-primary-hover focus:outline-hidden focus:bg-primary-focus disabled:opacity-50 disabled:pointer-events-none transition">
                    Sign in
                </button>

            </form>

        </div>

        <!-- Register link -->
        <p class="text-center text-sm text-muted-foreground-1 mt-4">
            Don't have an account?
            <a th:href="@{/register}" class="text-primary font-medium hover:underline">Create one</a>
        </p>

    </div>

    <script type="module" th:src="@{/assets/main.js}"></script>
</body>

</html>
