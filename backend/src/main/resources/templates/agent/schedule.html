<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{components/layout :: page(~{::content})}">
<head><title>My Schedule</title></head>
<body>
  <div th:fragment="content">

    <div class="mb-6">
      <h2 class="text-2xl font-semibold text-foreground">My Schedule</h2>
      <p class="text-sm text-muted-foreground-1">Upcoming deadlines and tickets due this week.</p>
    </div>

    <!-- This week summary cards -->
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
      <div class="bg-card border border-card-line rounded-xl p-5 shadow-2xs flex items-center gap-4">
        <div class="shrink-0 flex items-center justify-center size-11 rounded-xl bg-amber-50 text-amber-600">
          <svg class="size-5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="18" height="18" x="3" y="4" rx="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/>
          </svg>
        </div>
        <div>
          <p class="text-xs font-semibold uppercase tracking-wide text-muted-foreground-2">Due This Week</p>
          <p class="text-3xl font-bold text-foreground leading-none mt-0.5" th:text="${dueThisWeek} ?: '0'">0</p>
        </div>
      </div>
      <div class="bg-card border border-card-line rounded-xl p-5 shadow-2xs flex items-center gap-4">
        <div class="shrink-0 flex items-center justify-center size-11 rounded-xl bg-red-50 text-red-600">
          <svg class="size-5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/>
          </svg>
        </div>
        <div>
          <p class="text-xs font-semibold uppercase tracking-wide text-muted-foreground-2">Overdue</p>
          <p class="text-3xl font-bold text-red-600 leading-none mt-0.5" th:text="${overdueCount} ?: '0'">0</p>
        </div>
      </div>
      <div class="bg-card border border-card-line rounded-xl p-5 shadow-2xs flex items-center gap-4">
        <div class="shrink-0 flex items-center justify-center size-11 rounded-xl bg-green-50 text-green-600">
          <svg class="size-5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
        </div>
        <div>
          <p class="text-xs font-semibold uppercase tracking-wide text-muted-foreground-2">On Track</p>
          <p class="text-3xl font-bold text-green-600 leading-none mt-0.5" th:text="${onTrackCount} ?: '0'">0</p>
        </div>
      </div>
    </div>

    <!-- Upcoming deadlines table -->
    <div class="bg-card border border-card-line rounded-xl shadow-2xs">
      <div class="px-5 py-4 border-b border-card-line">
        <h3 class="text-xs font-bold uppercase tracking-widest text-muted-foreground-2">Upcoming Deadlines</h3>
      </div>

      <div th:if="${scheduledTickets == null or #lists.isEmpty(scheduledTickets)}"
           class="flex flex-col items-center justify-center py-16 text-center">
        <svg class="size-10 text-muted-foreground-2 opacity-30 mb-3" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect width="18" height="18" x="3" y="4" rx="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/>
        </svg>
        <p class="text-sm text-muted-foreground-1">No upcoming deadlines.</p>
      </div>

      <div th:if="${scheduledTickets != null and not #lists.isEmpty(scheduledTickets)}" class="overflow-x-auto">
        <table class="min-w-full divide-y divide-card-line">
          <thead class="bg-muted-hover">
            <tr>
              <th class="px-5 py-3 text-left text-xs font-semibold uppercase tracking-wide text-muted-foreground-2">Ticket</th>
              <th class="px-5 py-3 text-left text-xs font-semibold uppercase tracking-wide text-muted-foreground-2">Priority</th>
              <th class="px-5 py-3 text-left text-xs font-semibold uppercase tracking-wide text-muted-foreground-2">SLA Deadline</th>
              <th class="px-5 py-3 text-left text-xs font-semibold uppercase tracking-wide text-muted-foreground-2">Status</th>
              <th class="px-5 py-3"></th>
            </tr>
          </thead>
          <tbody class="divide-y divide-card-line">
            <tr th:each="t : ${scheduledTickets}" class="hover:bg-muted-hover transition-colors">
              <td class="px-5 py-3.5 text-sm font-medium text-foreground" th:text="${t.title}"></td>
              <td class="px-5 py-3.5">
                <span class="inline-flex items-center py-0.5 px-2 rounded text-xs font-bold uppercase tracking-wide"
                      th:classappend="${t.priority == 'CRITICAL'} ? 'bg-red-100 text-red-700'   :
                                       (${t.priority == 'HIGH'}   ? 'bg-amber-100 text-amber-700' :
                                       (${t.priority == 'MEDIUM'} ? 'bg-blue-100 text-blue-700'   : 'bg-surface-1 text-muted-foreground-2'))"
                      th:text="${t.priority}"></span>
              </td>
              <td class="px-5 py-3.5 text-sm font-semibold"
                  th:classappend="${t.slaBreached} ? 'text-red-600' : 'text-foreground'"
                  th:text="${t.slaDeadline != null} ? ${#temporals.format(t.slaDeadline, 'dd MMM yyyy HH:mm')} : '—'"></td>
              <td class="px-5 py-3.5">
                <span class="inline-flex items-center py-0.5 px-2.5 rounded-full text-xs font-semibold uppercase tracking-wide"
                      th:classappend="${t.status == 'ASSIGNED'}     ? 'bg-blue-50 text-blue-700'   :
                                       (${t.status == 'IN_PROGRESS'} ? 'bg-amber-50 text-amber-700' : 'bg-surface-1 text-muted-foreground-2')"
                      th:text="${t.status}"></span>
              </td>
              <td class="px-5 py-3.5 text-right">
                <a th:href="@{/requests/{id}(id=${t.id})}"
                   class="text-xs font-medium text-primary hover:underline">View</a>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</body>
</html>
