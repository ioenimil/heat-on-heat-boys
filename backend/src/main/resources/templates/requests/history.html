<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{components/layout :: page(~{::content})}">
<head><title>Request History</title></head>
<body>
  <div th:fragment="content">

    <div class="mb-6">
      <h2 class="text-2xl font-semibold text-foreground">Request History</h2>
      <p class="text-sm text-muted-foreground-1">All resolved and closed requests you have submitted.</p>
    </div>

    <div class="bg-card border border-card-line rounded-xl shadow-2xs">

      <!-- Empty state -->
      <div th:if="${history == null or #lists.isEmpty(history)}"
           class="flex flex-col items-center justify-center py-16 text-center">
        <svg class="size-10 text-muted-foreground-2 opacity-30 mb-3" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/>
        </svg>
        <p class="text-sm text-muted-foreground-1">No closed requests yet.</p>
      </div>

      <!-- Timeline rows -->
      <div th:if="${history != null and not #lists.isEmpty(history)}" class="divide-y divide-card-line">
        <div th:each="t : ${history}" class="flex items-start gap-4 px-5 py-4 hover:bg-muted-hover transition-colors">

          <!-- Status icon -->
          <div class="shrink-0 mt-0.5">
            <div th:if="${t.status == 'RESOLVED'}"
                 class="flex items-center justify-center size-8 rounded-full bg-green-50 text-green-600">
              <svg class="size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
              </svg>
            </div>
            <div th:unless="${t.status == 'RESOLVED'}"
                 class="flex items-center justify-center size-8 rounded-full bg-surface-1 text-muted-foreground-2">
              <svg class="size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 6 6 18"/><path d="m6 6 12 12"/>
              </svg>
            </div>
          </div>

          <div class="flex-1 min-w-0">
            <div class="flex items-start justify-between gap-4">
              <div>
                <p class="text-sm font-medium text-foreground" th:text="${t.title}"></p>
                <p class="text-xs text-muted-foreground-2 mt-0.5">
                  <span th:text="${t.category}"></span> ·
                  Submitted <span th:text="${#temporals.format(t.createdAt, 'dd MMM yyyy')}"></span>
                  <span th:if="${t.resolvedAt != null}">
                    · Resolved <span th:text="${#temporals.format(t.resolvedAt, 'dd MMM yyyy')}"></span>
                  </span>
                </p>
              </div>
              <span class="shrink-0 inline-flex items-center py-0.5 px-2.5 rounded-full text-xs font-semibold uppercase tracking-wide"
                    th:classappend="${t.status == 'RESOLVED'} ? 'bg-green-50 text-green-700' : 'bg-surface-1 text-muted-foreground-2'"
                    th:text="${t.status}"></span>
            </div>
          </div>

          <a th:href="@{/requests/{id}(id=${t.id})}"
             class="shrink-0 text-xs font-medium text-primary hover:underline self-center">View</a>
        </div>
      </div>

    </div>

  </div>
</body>
</html>
