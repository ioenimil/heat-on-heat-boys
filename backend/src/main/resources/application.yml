spring:
  application:
    name: servicehub
  datasource:
    url: jdbc:postgresql://localhost:5432/servicehub
    username: servicehub
    password: servicehubpass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: always
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false

server:
  port: 8080

jwt:
  secret: mySecretKeyForJWTtokenGeneration12345678901234567890
  expiration: 86400000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html