version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: servicehub-db
    environment:
      POSTGRES_DB: servicehub
      POSTGRES_USER: servicehub
      POSTGRES_PASSWORD: servicehub_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U servicehub"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: servicehub-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/servicehub
      SPRING_DATASOURCE_USERNAME: servicehub
      SPRING_DATASOURCE_PASSWORD: servicehub_pass
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
